<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8edf5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#2a4a7a" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="40" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#4a6a9a" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
  </g>

  <!-- Floating doc fragments (background, faded) -->
  <g opacity="0.15">
    <rect x="60" y="100" width="100" height="75" rx="5" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
    <line x1="72" y1="118" x2="140" y2="118" stroke="#b0c8e0" stroke-width="2"/>
    <line x1="72" y1="132" x2="130" y2="132" stroke="#c8d8e8" stroke-width="1.5"/>
    <line x1="72" y1="146" x2="120" y2="146" stroke="#c8d8e8" stroke-width="1.5"/>

    <rect x="640" y="80" width="100" height="75" rx="5" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
    <line x1="652" y1="98" x2="720" y2="98" stroke="#b0c8e0" stroke-width="2"/>
    <line x1="652" y1="112" x2="710" y2="112" stroke="#c8d8e8" stroke-width="1.5"/>
    <line x1="652" y1="126" x2="700" y2="126" stroke="#c8d8e8" stroke-width="1.5"/>
  </g>

  <!-- ==================== -->
  <!-- LEFT ARM + CLAW      -->
  <!-- ==================== -->
  <g filter="url(#shadow)">
    <!-- Upper arm -->
    <rect x="145" y="320" width="30" height="70" rx="10" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="2.5"/>
    <!-- Shoulder joint -->
    <circle cx="160" cy="325" r="12" fill="#c0c8d8" stroke="#7a8ea8" stroke-width="2"/>
    <!-- Forearm angled out -->
    <rect x="105" y="380" width="28" height="80" rx="8" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="2.5" transform="rotate(25, 119, 380)"/>
    <!-- Elbow joint -->
    <circle cx="148" cy="388" r="9" fill="#c0c8d8" stroke="#7a8ea8" stroke-width="2"/>

    <!-- CLAW -->
    <g transform="translate(95, 460)">
      <!-- Wrist -->
      <rect x="-18" y="-12" width="36" height="24" rx="7" fill="#8a9ab0" stroke="#5a7a9a" stroke-width="2.5"/>
      <!-- Finger left -->
      <path d="M-14,10 L-30,55 L-22,58 L-8,16" fill="#6a8098" stroke="#4a6a8a" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Finger center -->
      <path d="M-3,12 L-3,62 L5,62 L5,12" fill="#6a8098" stroke="#4a6a8a" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Finger right -->
      <path d="M14,10 L30,55 L22,58 L8,16" fill="#6a8098" stroke="#4a6a8a" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Tips -->
      <circle cx="-26" cy="57" r="4" fill="#4a90d9"/>
      <circle cx="1" cy="63" r="4" fill="#4a90d9"/>
      <circle cx="26" cy="57" r="4" fill="#4a90d9"/>
      <!-- Rivets -->
      <circle cx="-10" cy="3" r="3" fill="#7a8ea8"/>
      <circle cx="0" cy="3" r="3" fill="#7a8ea8"/>
      <circle cx="10" cy="3" r="3" fill="#7a8ea8"/>
    </g>

    <!-- Caught document (left claw) - drifting doc with red X -->
    <g transform="translate(40, 535) rotate(-8)">
      <rect x="0" y="0" width="80" height="60" rx="5" fill="#fff" stroke="#e74c3c" stroke-width="2.5"/>
      <line x1="10" y1="14" x2="65" y2="14" stroke="#e0a0a0" stroke-width="2.5"/>
      <line x1="10" y1="26" x2="55" y2="26" stroke="#eac0c0" stroke-width="2"/>
      <line x1="10" y1="38" x2="50" y2="38" stroke="#eac0c0" stroke-width="2"/>
      <!-- Red X -->
      <line x1="55" y1="-8" x2="75" y2="-20" stroke="#e74c3c" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="75" y1="-8" x2="55" y2="-20" stroke="#e74c3c" stroke-width="3.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ==================== -->
  <!-- RIGHT ARM + CLAW     -->
  <!-- ==================== -->
  <g filter="url(#shadow)">
    <!-- Upper arm -->
    <rect x="625" y="320" width="30" height="70" rx="10" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="2.5"/>
    <!-- Shoulder joint -->
    <circle cx="640" cy="325" r="12" fill="#c0c8d8" stroke="#7a8ea8" stroke-width="2"/>
    <!-- Forearm angled out -->
    <rect x="665" y="380" width="28" height="80" rx="8" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="2.5" transform="rotate(-25, 679, 380)"/>
    <!-- Elbow joint -->
    <circle cx="652" cy="388" r="9" fill="#c0c8d8" stroke="#7a8ea8" stroke-width="2"/>

    <!-- CLAW -->
    <g transform="translate(705, 460)">
      <!-- Wrist -->
      <rect x="-18" y="-12" width="36" height="24" rx="7" fill="#8a9ab0" stroke="#5a7a9a" stroke-width="2.5"/>
      <!-- Finger left (open) -->
      <path d="M-14,10 L-32,52 L-24,56 L-8,16" fill="#6a8098" stroke="#4a6a8a" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Finger center -->
      <path d="M-3,12 L-3,60 L5,60 L5,12" fill="#6a8098" stroke="#4a6a8a" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Finger right (open) -->
      <path d="M14,10 L32,52 L24,56 L8,16" fill="#6a8098" stroke="#4a6a8a" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Tips -->
      <circle cx="-28" cy="55" r="4" fill="#4a90d9"/>
      <circle cx="1" cy="61" r="4" fill="#4a90d9"/>
      <circle cx="28" cy="55" r="4" fill="#4a90d9"/>
      <!-- Rivets -->
      <circle cx="-10" cy="3" r="3" fill="#7a8ea8"/>
      <circle cx="0" cy="3" r="3" fill="#7a8ea8"/>
      <circle cx="10" cy="3" r="3" fill="#7a8ea8"/>
    </g>

    <!-- Document about to be caught (right claw) - warning doc -->
    <g transform="translate(680, 535) rotate(10)">
      <rect x="0" y="0" width="80" height="60" rx="5" fill="#fff" stroke="#f39c12" stroke-width="2.5"/>
      <line x1="10" y1="14" x2="65" y2="14" stroke="#d4a053" stroke-width="2.5"/>
      <line x1="10" y1="26" x2="55" y2="26" stroke="#e0d0a0" stroke-width="2"/>
      <line x1="10" y1="38" x2="50" y2="38" stroke="#e0d0a0" stroke-width="2"/>
      <!-- Warning triangle -->
      <polygon points="67,-15 58,0 76,0" fill="#f39c12" stroke="#e08900" stroke-width="2"/>
      <text x="67" y="-3" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">!</text>
    </g>
  </g>

  <!-- Action lines around claws -->
  <g stroke="#4a90d9" stroke-width="2.5" opacity="0.25" stroke-linecap="round">
    <line x1="55" y1="460" x2="35" y2="450"/><line x1="50" y1="480" x2="25" y2="475"/>
    <line x1="55" y1="500" x2="35" y2="505"/>
    <line x1="745" y1="455" x2="765" y2="445"/><line x1="750" y1="475" x2="775" y2="470"/>
    <line x1="745" y1="495" x2="765" y2="502"/>
  </g>

  <!-- ==================== -->
  <!-- PEET BODY (centered) -->
  <!-- ==================== -->
  <g filter="url(#shadow)">
    <!-- Antenna -->
    <line x1="400" y1="155" x2="400" y2="125" stroke="#7a8ea8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="400" cy="118" r="11" fill="#4a90d9" stroke="#357abd" stroke-width="2"/>
    <circle cx="400" cy="118" r="17" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.4"/>
    <circle cx="400" cy="118" r="24" fill="none" stroke="#4a90d9" stroke-width="1" opacity="0.2"/>

    <!-- Head -->
    <rect x="310" y="160" width="180" height="135" rx="28" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="3"/>

    <!-- Left eye (magnifier) -->
    <circle cx="362" cy="218" r="35" fill="#fff" stroke="#5a7a9a" stroke-width="3"/>
    <circle cx="362" cy="218" r="24" fill="url(#screenGrad)" stroke="#357abd" stroke-width="2"/>
    <line x1="387" y1="242" x2="405" y2="260" stroke="#5a7a9a" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="362" cy="218" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="366" cy="214" r="3.5" fill="#fff" opacity="0.6"/>

    <!-- Right eye (magnifier) -->
    <circle cx="438" cy="218" r="35" fill="#fff" stroke="#5a7a9a" stroke-width="3"/>
    <circle cx="438" cy="218" r="24" fill="url(#screenGrad)" stroke="#357abd" stroke-width="2"/>
    <line x1="463" y1="242" x2="480" y2="260" stroke="#5a7a9a" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="438" cy="218" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="442" cy="214" r="3.5" fill="#fff" opacity="0.6"/>

    <!-- Mouth - determined grin -->
    <path d="M375,268 Q400,284 425,268" fill="none" stroke="#5a7a9a" stroke-width="3" stroke-linecap="round"/>

    <!-- Neck -->
    <rect x="380" y="295" width="40" height="22" rx="6" fill="#c0c8d8" stroke="#7a8ea8" stroke-width="2"/>

    <!-- Body -->
    <rect x="295" y="315" width="210" height="180" rx="22" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="3"/>

    <!-- Chest screen -->
    <rect x="320" y="338" width="160" height="105" rx="12" fill="#1a3a5c" stroke="#4a6a8a" stroke-width="2"/>

    <!-- Screen content -->
    <line x1="338" y1="360" x2="460" y2="360" stroke="#4a90d9" stroke-width="2.5" opacity="0.8"/>
    <line x1="338" y1="377" x2="430" y2="377" stroke="#4a90d9" stroke-width="2" opacity="0.6"/>
    <line x1="338" y1="394" x2="445" y2="394" stroke="#4a90d9" stroke-width="2" opacity="0.5"/>
    <!-- DRIFT badge -->
    <rect x="335" y="408" width="55" height="22" rx="4" fill="#e74c3c" opacity="0.95"/>
    <text x="362" y="423" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">DRIFT</text>
    <!-- ALIGNED badge -->
    <rect x="400" y="408" width="65" height="22" rx="4" fill="#27ae60" opacity="0.95"/>
    <text x="432" y="423" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">ALIGNED</text>

    <!-- Status light -->
    <circle cx="465" cy="468" r="8" fill="#27ae60" filter="url(#glow)"/>
    <circle cx="465" cy="468" r="4" fill="#5eff5e" opacity="0.6"/>

    <!-- Gear -->
    <circle cx="335" cy="468" r="13" fill="none" stroke="#8a9ab0" stroke-width="2"/>
    <circle cx="335" cy="468" r="5.5" fill="#8a9ab0"/>

    <!-- Legs -->
    <rect x="340" y="500" width="42" height="68" rx="12" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="2.5"/>
    <rect x="418" y="500" width="42" height="68" rx="12" fill="url(#bodyGrad)" stroke="#7a8ea8" stroke-width="2.5"/>
    <!-- Feet -->
    <rect x="330" y="562" width="62" height="24" rx="11" fill="#a0aec0" stroke="#7a8ea8" stroke-width="2"/>
    <rect x="408" y="562" width="62" height="24" rx="11" fill="#a0aec0" stroke="#7a8ea8" stroke-width="2"/>
  </g>

  <!-- Bottom text -->
  <text x="400" y="650" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="32" fill="#4a6a8a" text-anchor="middle" font-weight="bold" letter-spacing="4">PITUITARY</text>
  <text x="400" y="680" font-family="'SF Pro', 'Helvetica Neue', sans-serif" font-size="16" fill="#8a9ab0" text-anchor="middle" letter-spacing="1.5">catch spec drift before it catches you</text>
</svg>