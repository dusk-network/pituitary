name: "Pituitary Review Spec"
author: "Dusk Network"
description: "Run pituitary review-spec on changed spec bundles in pull requests and post the report as a comment."

branding:
  icon: "git-pull-request"
  color: "blue"

inputs:
  pituitary-version:
    description: "Pituitary release version to install. If omitted, uses the action tag when available, otherwise the latest GitHub release."
    required: false
    default: ""

  config-path:
    description: "Path to the Pituitary config file, relative to the repository root."
    required: false
    default: ".pituitary/pituitary.toml"

  fail-on:
    description: |
      Lowest review severity that should fail the action:
      - error: deterministic doc-drift findings in a touched spec review
      - warning: error plus review warnings or possible-drift assessments
      - none: never fail; comment only
    required: false
    default: "error"

  update-comment:
    description: "If true, update the existing Pituitary review comment instead of creating a new one."
    required: false
    default: "true"

outputs:
  reviewed-spec-count:
    description: "Number of changed spec bundles reviewed."
    value: ${{ steps.review-spec.outputs.reviewed-spec-count }}

  error-count:
    description: "Number of reviewed spec bundles with error severity."
    value: ${{ steps.review-spec.outputs.error-count }}

  warning-count:
    description: "Number of reviewed spec bundles with warning severity."
    value: ${{ steps.review-spec.outputs.warning-count }}

  highest-severity:
    description: "Highest review severity seen across reviewed bundles: none, info, warning, or error."
    value: ${{ steps.review-spec.outputs.highest-severity }}

  reviewed-bundles:
    description: "JSON array of reviewed spec bundle paths."
    value: ${{ steps.review-spec.outputs.reviewed-bundles }}

runs:
  using: "composite"
  steps:
    - name: Check out repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 1

    - name: Resolve Pituitary version
      id: resolve-version
      uses: actions/github-script@v7
      with:
        script: |
          const explicit = `${{ inputs.pituitary-version }}`.trim();
          const actionRef = `${{ github.action_ref || '' }}`.trim();
          let version = explicit;

          if (!version) {
            if (/^v\d/.test(actionRef)) {
              version = actionRef;
            } else {
              const release = await github.rest.repos.getLatestRelease({
                owner: 'dusk-network',
                repo: 'pituitary',
              });
              version = release.data.tag_name;
            }
          }

          core.setOutput('version', version);

    - name: Install Pituitary
      shell: bash
      env:
        PITUITARY_VERSION: ${{ steps.resolve-version.outputs.version }}
      run: |
        set -euo pipefail

        version_no_v="${PITUITARY_VERSION#v}"
        archive="pituitary_${version_no_v}_linux_amd64.tar.gz"

        curl -fsSL -o "/tmp/${archive}" \
          "https://github.com/dusk-network/pituitary/releases/download/${PITUITARY_VERSION}/${archive}"
        tar -xzf "/tmp/${archive}" -C /tmp
        mkdir -p "$HOME/.local/bin"
        install -m 0755 /tmp/pituitary "$HOME/.local/bin/pituitary"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        pituitary version

    - name: Rebuild index
      shell: bash
      env:
        PITUITARY_CONFIG: ${{ inputs.config-path }}
      run: |
        set -euo pipefail
        pituitary index --rebuild --config "$PITUITARY_CONFIG"

    - name: List changed pull request files
      id: changed-files
      uses: actions/github-script@v7
      with:
        script: |
          if (context.eventName !== 'pull_request') {
            core.setOutput('files', '[]');
            return;
          }

          const files = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            per_page: 100,
          });

          core.setOutput('files', JSON.stringify(files.map(file => file.filename)));

    - name: Run review-spec for changed bundles
      id: review-spec
      shell: bash
      env:
        PITUITARY_BIN: pituitary
        PITUITARY_CONFIG: ${{ inputs.config-path }}
        FAIL_ON: ${{ inputs.fail-on }}
        CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.files }}
      run: bash "${{ github.action_path }}/scripts/review-spec-action.sh"

    - name: Post or update pull request comment
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        COMMENT_BODY: ${{ steps.review-spec.outputs.comment-body }}
        HAS_REVIEWS: ${{ steps.review-spec.outputs.has-reviews }}
        UPDATE_COMMENT: ${{ inputs.update-comment }}
      with:
        script: |
          const marker = '<!-- pituitary-review-spec -->';
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const issue_number = context.issue.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.find(comment => comment.body && comment.body.includes(marker));

          if (process.env.HAS_REVIEWS !== 'true') {
            if (existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id,
              });
            }
            return;
          }

          const body = process.env.COMMENT_BODY;
          if (existing && process.env.UPDATE_COMMENT === 'true') {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
            return;
          }

          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number,
            body,
          });

    - name: Fail on configured severity threshold
      shell: bash
      env:
        EXIT_CODE: ${{ steps.review-spec.outputs.exit-code }}
      run: |
        set -euo pipefail
        if [ "${EXIT_CODE:-0}" -ne 0 ]; then
          exit "${EXIT_CODE}"
        fi
