name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Validate release configuration
        run: goreleaser check

      - name: Run formatting check
        run: make fmt-check

      - name: Run SQLite readiness smoke test
        run: make smoke-sqlite-vec

      - name: Run tests
        run: make test

      - name: Run static analysis
        run: make vet

  macos:
    runs-on: macos-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # fmt-check is platform-independent; run it only in the linux go job.
      - name: Run SQLite readiness smoke test
        run: make smoke-sqlite-vec

      - name: Run tests
        run: make test

      - name: Run static analysis
        run: make vet

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build contributor Dockerfile
        run: docker build --progress=plain --tag pituitary-dev:${{ github.sha }} .
