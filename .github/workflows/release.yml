name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            release_runner_os: linux
            artifact_name: release-linux
          - runs_on: macos-14
            release_runner_os: darwin
            artifact_name: release-macos
          - runs_on: windows-latest
            release_runner_os: windows
            artifact_name: release-windows

    runs-on: ${{ matrix.runs_on }}
    env:
      PITUITARY_RELEASE_RUNNER_OS: ${{ matrix.release_runner_os }}
    steps:
      - name: Disable CRLF conversion for MSYS2 builds
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf input

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Windows CGO toolchain
        id: msys2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-sqlite3

      - name: Run GoReleaser packaging
        if: runner.os != 'Windows'
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish --skip=announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser packaging
        if: runner.os == 'Windows'
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish --skip=announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC: ${{ runner.os == 'Windows' && format('{0}/ucrt64/bin/gcc.exe', steps.msys2.outputs.msys2-location) || '' }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Generate release checksums
        run: |
          cd dist/release
          sha256sum *.tar.gz *.zip > "pituitary_${TAG}_checksums.txt"

      - name: Build MCPB bundles
        run: |
          VERSION="${TAG#v}"

          # Windows MCPB bundle is deferred: the MCPB ecosystem primarily targets
          # Unix platforms. Windows users install via the .zip from GitHub Releases.
          for archive_info in "linux_amd64:pituitary-linux-amd64" "macOS_arm64:pituitary-darwin-arm64"; do
            os_arch="${archive_info%%:*}"
            bundle_name="${archive_info##*:}"
            archive_path="dist/release/pituitary_${VERSION}_${os_arch}.tar.gz"

            if [ ! -f "$archive_path" ]; then
              echo "Skipping ${os_arch} (archive not found)"
              continue
            fi

            echo "Building MCPB bundle: ${bundle_name}"
            workdir="$(mktemp -d)"

            tar xzf "$archive_path" -C "$workdir"
            sed "s/\${VERSION}/${VERSION}/g" .mcpb/manifest.template.json > "$workdir/manifest.json"
            cp LICENSE "$workdir/"
            cp README.md "$workdir/"

            npx @anthropic-ai/mcpb@2.1.2 pack "$workdir" "dist/release/${bundle_name}.mcpb"
            rm -rf "$workdir"
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/* --clobber
          else
            gh release create "$TAG" --verify-tag --generate-notes dist/release/*
          fi

      - name: Publish to MCP registry
        run: |
          VERSION="${TAG#v}"

          # Pin mcp-publisher to a specific version with integrity check.
          MCP_PUBLISHER_VERSION="v1.7.6"
          MCP_PUBLISHER_SHA256="bcc96ca630cae4cf503b4550bd4a17462d42ad4819273bee56f4385bb059ddee"
          MCP_REGISTRY_URL="https://registry.modelcontextprotocol.io"
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c
          tar xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher

          PACKAGES="[]"
          for mcpb in dist/release/*.mcpb; do
            [ -f "$mcpb" ] || continue
            filename="$(basename "$mcpb")"
            sha256="$(sha256sum "$mcpb" | awk '{print $1}')"
            url="https://github.com/dusk-network/pituitary/releases/download/${TAG}/${filename}"
            PACKAGES=$(echo "$PACKAGES" | jq --arg url "$url" --arg sha "$sha256" \
              '. + [{"registryType":"mcpb","identifier":$url,"fileSha256":$sha,"transport":{"type":"stdio"},"environmentVariables":[]}]')
          done

          jq -n \
            --arg version "$VERSION" \
            --argjson packages "$PACKAGES" \
            '{
              "$schema": "https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json",
              "name": "io.github.dusk-network/pituitary",
              "description": "Catch spec drift before it catches you. Detect overlap, stale docs, and code drift.",
              "repository": {"url": "https://github.com/dusk-network/pituitary", "source": "github"},
              "version": $version,
              "packages": $packages
            }' > server.json

          cat server.json
          ./mcp-publisher validate
          ./mcp-publisher login github-oidc --registry "$MCP_REGISTRY_URL"
          ./mcp-publisher publish
